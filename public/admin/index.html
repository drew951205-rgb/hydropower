<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>師傅抵嘉後台</title>
    <link rel="stylesheet" href="/admin/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">師傅抵嘉</p>
        <h1>營運後台</h1>
      </div>
      <div class="auth">
        <label for="adminKey">管理金鑰</label>
        <input id="adminKey" type="password" autocomplete="current-password" placeholder="x-admin-api-key">
        <button id="saveKeyButton" type="button">儲存</button>
      </div>
    </header>

    <main class="workspace">
      <section class="orders-section" aria-labelledby="ordersTitle">
        <div class="section-head">
          <div>
            <h2 id="ordersTitle">案件</h2>
            <p id="statusText">準備載入</p>
          </div>
          <div class="filters">
            <select id="statusFilter" aria-label="案件狀態">
              <option value="">全部狀態</option>
              <option value="pending_review">待審核</option>
              <option value="pending_dispatch">待派單</option>
              <option value="dispatching">派單中</option>
              <option value="assigned">已接單</option>
              <option value="quoted">已報價</option>
              <option value="in_progress">客戶已接受報價</option>
              <option value="arrived">已到場</option>
              <option value="completed_pending_customer">待客戶確認</option>
              <option value="closed">已結案</option>
              <option value="platform_review">平台審核</option>
              <option value="dispute_review">爭議審核</option>
            </select>
            <button id="refreshButton" type="button">重新整理</button>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>編號</th>
                <th>狀態</th>
                <th>區域</th>
              <th>類型</th>
              <th>時間</th>
              <th>師傅</th>
              <th>下一步</th>
                <th>建立</th>
              </tr>
            </thead>
            <tbody id="ordersTable"></tbody>
          </table>
        </div>
      </section>

      <aside class="side-panel" aria-labelledby="detailTitle">
        <img class="panel-image" src="/admin/tools.svg" alt="">

        <section class="detail-section">
          <div class="section-head compact">
            <div>
              <h2 id="detailTitle">案件詳情</h2>
              <p id="detailHint">選擇一張案件</p>
            </div>
          </div>
          <dl id="orderDetail" class="detail-list"></dl>
        </section>

        <section class="actions-section" aria-labelledby="actionsTitle">
          <h2 id="actionsTitle">案件操作</h2>
          <div id="actions" class="actions"></div>
        </section>

        <section class="crm-section" aria-labelledby="customersTitle">
          <div class="section-head compact">
            <div>
              <h2 id="customersTitle">客戶名單</h2>
              <p id="customerStatus">準備載入</p>
            </div>
            <button id="loadCustomersButton" type="button">載入</button>
          </div>
          <div id="customerList" class="customer-list"></div>
          <div id="customerDetail" class="customer-detail"></div>

          <form id="memberBroadcastForm" class="stack-form">
            <h3>會員最新消息</h3>
            <label>
              標題
              <input name="title" maxlength="40" required placeholder="例如：雨季漏水檢查提醒">
            </label>
            <label>
              內容
              <textarea name="message" maxlength="500" required placeholder="輸入要傳給會員的最新消息"></textarea>
            </label>
            <button type="submit">發送給會員</button>
          </form>
        </section>

        <section class="technicians-section" aria-labelledby="techniciansTitle">
          <div class="section-head compact">
            <div>
              <h2 id="techniciansTitle">師傅</h2>
              <p id="technicianStatus">準備載入</p>
            </div>
            <button id="loadTechniciansButton" type="button">載入</button>
          </div>

          <div id="technicianList" class="technician-list"></div>

          <form id="createTechnicianForm" class="stack-form">
            <h3>新增師傅</h3>
            <label>
              LINE user ID
              <input name="line_user_id" required placeholder="Uxxxxxxxx">
            </label>
            <label>
              姓名
              <input name="name" required placeholder="王師傅">
            </label>
            <label>
              電話
              <input name="phone" placeholder="0911222333">
            </label>
            <label>
              服務區域
              <input name="service_areas" placeholder="西區,東區">
            </label>
            <label>
              服務類型
              <input name="service_types" placeholder="漏水,馬桶,熱水器">
            </label>
            <label>
              可接時段
              <input name="available_time_text" placeholder="平日 18:00 後、週六全天">
            </label>
            <button type="submit">建立師傅</button>
          </form>
        </section>
      </aside>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="/admin/app.js"></script>
  </body>
</html>
