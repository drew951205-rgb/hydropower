<svg xmlns="http://www.w3.org/2000/svg" width="2500" height="1686" viewBox="0 0 2500 1686" role="img" aria-labelledby="title desc">
  <title id="title">師傅抵嘉顧客版 LINE Rich Menu</title>
  <desc id="desc">上方一個我要報修大按鈕，下方三格為加入會員、我的案件、聯絡客服。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.5" stop-color="#f1f8f5"/>
      <stop offset="1" stop-color="#fff4ee"/>
    </linearGradient>
    <linearGradient id="repair" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#1f8a70"/>
      <stop offset="1" stop-color="#35b995"/>
    </linearGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#111827" flood-opacity="0.16"/>
    </filter>
    <style>
      .label { font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif; font-weight: 800; }
      .sub { font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif; font-weight: 600; }
      .dark { fill: #111827; }
      .muted { fill: #4b5563; }
      .white { fill: #ffffff; }
      .icon-light { fill: none; stroke: #ffffff; stroke-width: 18; stroke-linecap: round; stroke-linejoin: round; }
      .icon { fill: none; stroke: #1f8a70; stroke-width: 16; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="2500" height="1686" rx="72" fill="url(#bg)"/>
  <circle cx="2180" cy="280" r="320" fill="#ffe0d5" opacity="0.58"/>
  <circle cx="260" cy="1350" r="420" fill="#d9f2ea" opacity="0.62"/>
  <path d="M0 560 C430 390 650 760 1020 560 C1400 350 1580 720 1920 520 C2160 390 2360 450 2500 525 L2500 0 L0 0 Z" fill="#e4f4ef" opacity="0.82"/>

  <rect x="70" y="70" width="2360" height="1516" rx="58" fill="#ffffff" opacity="0.96" filter="url(#soft)"/>

  <rect x="70" y="70" width="2360" height="758" rx="58" fill="url(#repair)"/>
  <path d="M70 705 C420 585 620 805 930 650 C1215 505 1405 720 1695 585 C1990 450 2210 540 2430 470 L2430 828 L70 828 Z" fill="#ffffff" opacity="0.12"/>

  <g transform="translate(470 260)">
    <rect class="icon-light" x="0" y="0" width="260" height="260" rx="42"/>
    <path class="icon-light" d="M60 130 H200 M130 60 V200"/>
  </g>
  <text x="1350" y="395" text-anchor="middle" class="label white" font-size="120">我要報修</text>
  <text x="1350" y="500" text-anchor="middle" class="sub white" font-size="48">漏水、堵塞、插座、熱水器，直接填表送出</text>

  <rect x="70" y="828" width="786.67" height="758" rx="0" fill="#fbfdfc"/>
  <rect x="856.67" y="828" width="786.66" height="758" fill="#ffffff"/>
  <rect x="1643.33" y="828" width="786.67" height="758" rx="0" fill="#fbfdfc"/>
  <line x1="856.67" y1="828" x2="856.67" y2="1586" stroke="#d7dfd7" stroke-width="4"/>
  <line x1="1643.33" y1="828" x2="1643.33" y2="1586" stroke="#d7dfd7" stroke-width="4"/>
  <line x1="70" y1="828" x2="2430" y2="828" stroke="#d7dfd7" stroke-width="4"/>

  <g transform="translate(295 1010)">
    <circle class="icon" cx="150" cy="95" r="70"/>
    <path class="icon" d="M35 285 C70 195 230 195 265 285"/>
    <path class="icon" d="M305 70 V170 M255 120 H355"/>
  </g>
  <text x="463" y="1350" text-anchor="middle" class="label dark" font-size="70">加入會員</text>
  <text x="463" y="1430" text-anchor="middle" class="sub muted" font-size="34">自動帶入資料</text>

  <g transform="translate(1080 1015)">
    <rect class="icon" x="35" y="45" width="250" height="220" rx="30"/>
    <path class="icon" d="M90 118 H230 M90 180 H230"/>
  </g>
  <text x="1250" y="1350" text-anchor="middle" class="label dark" font-size="70">我的案件</text>
  <text x="1250" y="1430" text-anchor="middle" class="sub muted" font-size="34">查詢進度</text>

  <g transform="translate(1868 1015)">
    <path class="icon" d="M55 75 H305 V230 H185 L105 295 V230 H55 Z"/>
    <circle cx="130" cy="155" r="11" fill="#1f8a70"/>
    <circle cx="180" cy="155" r="11" fill="#1f8a70"/>
    <circle cx="230" cy="155" r="11" fill="#1f8a70"/>
  </g>
  <text x="2037" y="1350" text-anchor="middle" class="label dark" font-size="70">聯絡客服</text>
  <text x="2037" y="1430" text-anchor="middle" class="sub muted" font-size="34">需要協助找我們</text>
</svg>
