<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>我要報修｜師傅抵嘉</title>
  <link rel="stylesheet" href="/liff/styles.css">
</head>
<body data-page="repair">
  <main class="page">
    <p class="eyebrow">師傅抵嘉</p>
    <h1>我要報修</h1>
    <p class="lead">填好資料後，平台會先審核案件，再幫你找合適師傅。</p>
    <p id="status" class="notice" hidden></p>
    <form id="repair-form">
      <input id="line_user_id" name="line_user_id" type="hidden">
      <label>服務類型
        <select name="service_type" required>
          <option value="">請選擇</option>
          <option>漏水</option>
          <option>馬桶堵塞</option>
          <option>插座故障</option>
          <option>熱水器問題</option>
          <option>其他水電</option>
        </select>
      </label>
      <label>所在區域
        <input name="area" placeholder="例如：嘉義市西區" required>
      </label>
      <label>完整地址
        <input name="address" placeholder="例如：嘉義市西區中山路100號" required>
      </label>
      <label>預約時間
        <input name="preferred_time_text" placeholder="例如：越快越好、明天下午 2-5 點" required>
      </label>
      <label>問題描述
        <textarea name="issue_description" placeholder="請描述位置、狀況、多久了，越清楚越好報價。" required></textarea>
      </label>
      <label>上傳照片
        <input name="images" type="file" accept="image/jpeg,image/png,image/webp" multiple>
      </label>
      <label>聯絡電話
        <input name="contact_phone" inputmode="tel" placeholder="0912345678" required>
      </label>
      <button type="submit">送出報修</button>
    </form>
  </main>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="/liff/app.js"></script>
</body>
</html>
