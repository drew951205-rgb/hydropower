<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>追加報價｜師傅抵嘉</title>
  <link rel="stylesheet" href="/liff/styles.css">
</head>
<body data-page="change-request">
  <main class="page">
    <p class="eyebrow">師傅抵嘉</p>
    <h1>追加報價</h1>
    <p class="lead">現場有額外項目時，請填追加金額與原因，顧客確認後再施作。</p>
    <p id="status" class="notice" hidden></p>
    <section id="order-panel" class="panel">載入案件中...</section>
    <section id="photos" class="photo-grid"></section>
    <form id="change-form">
      <label>追加金額
        <input name="amount" type="number" min="1" required>
      </label>
      <label>追加原因
        <textarea name="reason" placeholder="例如：止水閥老化，需要更換零件。" required></textarea>
      </label>
      <label>現場照片
        <input name="images" type="file" accept="image/jpeg,image/png,image/webp" multiple>
      </label>
      <label>
        <span>是否需要顧客確認</span>
        <select name="needs_customer_confirm">
          <option value="true">需要，送出後等待顧客同意</option>
        </select>
      </label>
      <button type="submit">送出追加報價</button>
    </form>
  </main>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="/liff/app.js"></script>
</body>
</html>
