<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>案件申訴</title>
  <link rel="stylesheet" href="/liff/styles.css">
</head>
<body data-page="support">
  <main class="page">
    <p class="eyebrow">平台協助</p>
    <h1 id="support-title">案件申訴</h1>
    <p id="support-lead" class="lead">若你對報價、施工品質、完工結果或師傅未到場有疑慮，請填寫申訴內容，平台會依案件紀錄協助處理。</p>
    <p id="status" class="notice" hidden></p>
    <section id="order-panel" class="panel" hidden></section>
    <form id="support-form">
      <input id="line_user_id" name="line_user_id" type="hidden">
      <input id="support-order-id" name="order_id" type="hidden">
      <label>申訴類型
        <select id="support-type" name="type" required>
          <option value="quote_dispute">報價申訴</option>
          <option value="completion_dispute">完工申訴</option>
          <option value="technician_no_show">師傅未到場</option>
          <option value="service_quality">施工品質</option>
          <option value="cancel_order">取消案件爭議</option>
        </select>
      </label>
      <label>聯絡電話
        <input name="phone" inputmode="tel" autocomplete="tel" placeholder="0912345678">
      </label>
      <label>申訴內容
        <textarea name="message" maxlength="1000" placeholder="請寫下發生的情況、時間、雙方已溝通內容，以及你希望平台協助的方向。" required></textarea>
      </label>
      <label>補充照片
        <input name="images" type="file" accept="image/jpeg,image/png,image/webp" multiple>
      </label>
      <button type="submit">送出申訴</button>
    </form>
  </main>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="/liff/app.js"></script>
</body>
</html>
